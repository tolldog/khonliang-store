# khonliang-store config — copy to config.yaml and edit locally.
# config.yaml is git-ignored; machine-specific paths and tokens go here.

# Bus URL this agent registers with.
bus_url: http://localhost:8788

# Artifact backend selection. The default ("bus") preserves the
# original Phase-2 behavior: store proxies all reads to the bus's
# REST routes and rejects writes.
#
# - "local" (Phase 4a): store owns reads + writes through a local
#   SQLite file. Bus-resident artifacts become invisible to the
#   store agent — useful only for greenfield deployments with no
#   existing corpus.
#
# - "composite" (Phase 4b, recommended for migrating deployments):
#   writes go to the local SQLite file; reads check local first
#   and fall through to the bus's REST surface for any artifact
#   not yet migrated. Pair with the artifact_migrate_from_bus
#   skill to copy historical artifacts into the local DB; the
#   migration is idempotent so a partial run is safe to re-run.
artifacts:
  backend: bus      # bus | local | composite
  # Path to the SQLite file when backend=local or backend=composite.
  # Relative paths resolve against the directory containing this
  # config file. Default: store_artifacts.db next to the config.
  # db_path: data/store_artifacts.db
